name: Deploy Pages PR Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: write
  pull-requests: write

jobs:
  pr-preview:
    runs-on: ubuntu-latest
    concurrency:
      group: pages-pr-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        if: github.event.action != 'closed'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish PR preview to gh-pages
        if: github.event.action != 'closed'
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"
          PREVIEW_DIR="$(mktemp -d)"
          TARGET_PATH="pr-preview/pr-${PR_NUMBER}"

          trap 'git worktree remove "${PREVIEW_DIR}" --force || true' EXIT

          git fetch origin gh-pages || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add "${PREVIEW_DIR}" origin/gh-pages
          else
            git worktree add -b gh-pages "${PREVIEW_DIR}"
          fi

          mkdir -p "${PREVIEW_DIR}/${TARGET_PATH}"
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            ./ "${PREVIEW_DIR}/${TARGET_PATH}/"

          touch "${PREVIEW_DIR}/.nojekyll"

          cd "${PREVIEW_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No preview changes to publish."
            exit 0
          fi

          git commit -m "Update PR preview #${PR_NUMBER} (${GITHUB_SHA::7})"
          git push origin HEAD:gh-pages

      - name: Comment preview URL
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const marker = '<!-- pages-pr-preview -->';
            const url = `https://kyle-skrinak-gilead.github.io/sparc-form-prototype/pr-preview/pr-${pr}/`;
            const body = `${marker}\n✅ PR preview ready: ${url}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              per_page: 100
            });
            const existing = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body
              });
            }

      - name: Checkout default branch (for cleanup)
        if: github.event.action == 'closed'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove PR preview from gh-pages
        if: github.event.action == 'closed'
        shell: bash
        run: |
          set -euo pipefail

          PR_NUMBER="${{ github.event.pull_request.number }}"
          PREVIEW_DIR="$(mktemp -d)"
          TARGET_PATH="pr-preview/pr-${PR_NUMBER}"

          trap 'git worktree remove "${PREVIEW_DIR}" --force || true' EXIT

          git fetch origin gh-pages || true

          if ! git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            echo "No gh-pages branch exists; nothing to clean."
            exit 0
          fi

          git worktree add "${PREVIEW_DIR}" origin/gh-pages

          if [ ! -d "${PREVIEW_DIR}/${TARGET_PATH}" ]; then
            echo "No preview directory found for PR #${PR_NUMBER}; nothing to clean."
            exit 0
          fi

          rm -rf "${PREVIEW_DIR:?}/${TARGET_PATH}"

          cd "${PREVIEW_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No cleanup changes to commit."
            exit 0
          fi

          git commit -m "Remove PR preview #${PR_NUMBER}"
          git push origin HEAD:gh-pages
