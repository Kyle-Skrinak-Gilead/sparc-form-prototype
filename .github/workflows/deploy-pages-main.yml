name: Deploy Pages (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-main-to-gh-pages:
    runs-on: ubuntu-latest
    concurrency:
      group: pages-main-deploy
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish main content to gh-pages
        shell: bash
        run: |
          set -euo pipefail

          PREVIEW_DIR="$(mktemp -d)"
          trap 'git worktree remove "${PREVIEW_DIR}" --force || true' EXIT

          git fetch origin gh-pages || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add "${PREVIEW_DIR}" origin/gh-pages
          else
            git worktree add -b gh-pages "${PREVIEW_DIR}"
          fi

          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            ./ "${PREVIEW_DIR}/"

          touch "${PREVIEW_DIR}/.nojekyll"

          cd "${PREVIEW_DIR}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No gh-pages changes to publish."
            exit 0
          fi

          git commit -m "Deploy main to GitHub Pages (${GITHUB_SHA::7})"
          git push origin HEAD:gh-pages
